<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dove Nest | Premium Sports & Leisure</title>
    <!-- Corrected Path to CSS inside frontend folder -->
    <link rel="stylesheet" href="frontend/css/dove-nest.css">
</head>
<body>
    <!-- Animated Loading Screen -->
    <div id="loader">
        <div class="spinner"></div>
        <h1>DOVE NEST</h1>
    </div>

    <!-- Main Content Navigation -->
    <nav class="glass-nav">
        <div class="logo">Dove Nest</div>
        <div class="nav-links">
            <a href="#booking" class="haptic-btn">Book Now</a>
            <!-- Corrected Paths for GitHub Pages Routing -->
            <a href="frontend/calendar.html" class="haptic-btn">Availability</a>
            <a href="frontend/gallery.html" class="haptic-btn">Gallery</a>
        </div>
    </nav>

    <!-- Hero Section -->
    <header class="hero">
        <div class="hero-content">
            <h2>Escape to Serenity</h2>
            <p>Your ultimate destination for Day-outs, Night-outs, and Exclusive Venue Bookings in Santa Cruz, Goa.</p>
            
            <!-- WhatsApp Booking Triggers -->
            <div class="booking-grid">
                <button class="wa-book-btn haptic-btn" data-type="Dayout">Book a Day Out</button>
                <button class="wa-book-btn haptic-btn" data-type="Nightout">Book a Night Out</button>
                <button class="wa-book-btn haptic-btn" data-type="Venue">Book the Venue</button>
            </div>
        </div>
    </header>

    <!-- Subsidiary Redirect Section -->
    <section class="caterer-redirect">
        <h3>Craving Authentic Goan Flavours?</h3>
        <p>Experience our premium culinary subsidiary.</p>
        <!-- Corrected Path to Subsidiary Page -->
        <a href="frontend/catering.html" class="center-caterer-btn haptic-btn">Visit Dove Caterers</a>
    </section>

    <!-- Testimonials Section (Placeholder for Python API injection) -->
    <section class="reviews">
        <h3>Guest Experiences</h3>
        <div id="google-reviews-container">
            <!-- Reviews injected here via JS/Python -->
        </div>
    </section>

    <!-- Corrected Path to compiled TypeScript Logic -->
    <script src="frontend/js/main.js"></script>
</body>
</html>
